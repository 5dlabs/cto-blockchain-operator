name: Test with KinD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler build-essential

    - name: Run unit tests
      run: |
        cargo test --lib

  provider-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler build-essential

    - name: Run provider tests
      run: |
        cargo test --test cherry_provider_test
        cargo test --test latitude_provider_test
        cargo test --test ovh_provider_test

  integration-tests:
    runs-on: ubuntu-latest
    needs: provider-tests
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler build-essential

    - name: Run integration tests
      run: |
        cargo test --test integration_test

  kind-test:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler build-essential

    - name: Create KinD cluster
      uses: helm/kind-action@v1.8.0
      with:
        cluster_name: cto-test

    - name: Install cert-manager
      run: |
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.5/cert-manager.yaml
        kubectl wait --for=condition=available --timeout=300s deployment/cert-manager -n cert-manager
        kubectl wait --for=condition=available --timeout=300s deployment/cert-manager-webhook -n cert-manager

    - name: Build and deploy CRDs
      run: |
        # Apply our custom CRDs
        kubectl apply -f config/crd/bases/

    - name: Test Solana validator deployment
      run: |
        # Deploy example Solana validator
        kubectl apply -f examples/solana-validator.yaml
        
        # Wait for resources to be created
        sleep 10
        
        # Check status
        kubectl get solananodes
        
        # Validate CRD creation
        kubectl get crds | grep solananodes

    - name: Test all blockchain types
      run: |
        # Create examples for all supported blockchain node types
        echo "Testing all supported blockchain node types..."
        
        # Test different Solana node types (validator, rpc, archival)
        echo "Testing Solana node types..."
        
        # In a real implementation, we would have example files for each type
        # For now, we'll just validate the CRD can handle different specs
        
        # Validate CRD schema supports all node types
        echo "Validating CRD schema..."
        kubectl explain solananodes.spec.nodeType
        
        # Test resource requirements validation
        echo "Testing resource requirements..."

    - name: Test provider integrations
      run: |
        echo "Testing provider integration points..."
        # This would test that the operator can interface with all providers
        # In a real test, we would mock the provider APIs
        
        echo "Provider integration test completed"

    - name: Cleanup
      if: always()
      run: |
        kind delete cluster

  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: kind-test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
