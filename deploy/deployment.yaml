apiVersion: apps/v1
kind: Deployment
metadata:
  name: cto-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cto-operator
  template:
    metadata:
      labels:
        app: cto-operator
    spec:
      serviceAccountName: cto-operator
      containers:
      - name: cto-operator
        image: ghcr.io/5dlabs/cto-blockchain-operator:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CHERRY_API_KEY
          valueFrom:
            secretKeyRef:
              name: cherry-credentials
              key: api-key
        - name: LATITUDE_API_KEY
          valueFrom:
            secretKeyRef:
              name: latitude-credentials
              key: api-key
        ports:
        - containerPort: 8080
          name: metrics
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
