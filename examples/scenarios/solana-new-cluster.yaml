apiVersion: blockchain.5dlabs.io/v1alpha1
kind: SolanaNode
metadata:
  name: solana-cluster-vilnius
  namespace: cto
spec:
  deployment_mode: External
  external_cluster:
    provider: cherry
    mode: provision-new-cluster
    region_preferences:
      - lt-siauliai
    create_k8s_cluster: true
    ssh_keys:
      - ssh-rsa AAAAB3NzaC1...
  node_pools:
    - role: solana-rpc
      replicas: 1
      resources:
        cpu_request: "28"
        memory_request: 64Gi
      config:
        node_type: validator
    - role: support-services
      replicas: 1
      resources:
        cpu_request: "8"
        memory_request: 32Gi
      config:
        services:
          - questdb
          - postgres
          - redis
          - big-balls
